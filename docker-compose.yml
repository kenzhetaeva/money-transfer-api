services:
    php:
        build:
            context: .
            dockerfile: docker/php/Dockerfile
        volumes:
            -   ./:/app
        working_dir: /app

    nginx:
        image: nginx:alpine
        ports:
            - "8081:80"
        volumes:
            -   ./:/app
            - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
        depends_on:
            -   php

    postgres:
        image: postgres:17
        environment:
            POSTGRES_DB: money_transfer
            POSTGRES_USER: postgres
            POSTGRES_PASSWORD: postgres
        ports:
            -   "5432:5432"